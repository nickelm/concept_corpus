<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>concept-corpus viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e17;
    --bg2: #111827;
    --bg3: #1a2235;
    --fg: #e2e8f0;
    --fg2: #94a3b8;
    --accent: #60a5fa;
    --accent2: #a78bfa;
    --border: #1e293b;
    --hover: #2a3a52;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: auto 1fr;
  }

  header {
    grid-column: 1 / -1;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
    background: var(--bg2);
  }

  header h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--fg2);
  }

  header h1 span { color: var(--accent); }

  .axis-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--fg2);
  }

  .axis-selector select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--bg3);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    cursor: pointer;
    max-width: 280px;
  }

  .axis-selector select:hover { border-color: var(--accent); }

  .aggregation-slider {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--fg2);
  }

  .aggregation-slider label {
    font-size: 12px;
    white-space: nowrap;
  }

  .aggregation-slider input[type="range"] {
    width: 160px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  #agg-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    min-width: 80px;
  }

  .stats {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--fg2);
  }

  /* ── Scatter plot ─────────────────────────────── */

  #plot-container {
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  canvas { display: block; }

  .axis-label {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg2);
    opacity: 0.6;
    pointer-events: none;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .axis-label.x-axis { bottom: 8px; left: 50%; transform: translateX(-50%); }
  .axis-label.y-axis { top: 50%; left: 8px; transform: rotate(-90deg) translateX(-50%); transform-origin: left center; }

  /* ── Tooltip ──────────────────────────────────── */

  #tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    max-width: 320px;
    font-size: 13px;
    line-height: 1.5;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
    z-index: 100;
  }

  #tooltip .title {
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--fg);
  }

  #tooltip .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg2);
    margin-bottom: 8px;
  }

  /* ── Side panel ───────────────────────────────── */

  #sidebar {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }

  .panel-section {
    margin-bottom: 24px;
  }

  .panel-section h2 {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg2);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 13px;
    cursor: pointer;
  }

  .legend-item:hover { color: var(--accent); }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg2);
    margin-left: auto;
  }

  .cluster-item {
    padding: 8px;
    margin-bottom: 6px;
    background: var(--bg3);
    border-radius: 4px;
    border-left: 3px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .cluster-item:hover { border-left-color: var(--accent); }

  .cluster-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .cluster-docs {
    font-size: 12px;
    color: var(--fg2);
    line-height: 1.6;
  }

  .doc-list-item {
    padding: 6px 8px;
    margin-bottom: 2px;
    border-radius: 3px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .doc-list-item:hover { background: var(--hover); }

  .doc-list-item .doc-title { font-weight: 500; }
  .doc-list-item .doc-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg2);
  }

  .file-input-area {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    color: var(--fg2);
    transition: border-color 0.15s;
  }

  .file-input-area:hover { border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1><span>concept</span>-corpus</h1>
  <div class="axis-selector">
    <label>X:</label>
    <select id="x-axis"></select>
  </div>
  <div class="axis-selector">
    <label>Y:</label>
    <select id="y-axis"></select>
  </div>
  <div class="aggregation-slider" id="agg-slider-container" style="display:none">
    <label>Aggregation:</label>
    <input type="range" id="agg-slider" min="0" max="1000" value="0" step="1">
    <span id="agg-label"></span>
  </div>
  <div class="stats" id="stats"></div>
</header>

<div id="plot-container">
  <canvas id="canvas"></canvas>
  <div class="axis-label x-axis" id="x-label"></div>
  <div class="axis-label y-axis" id="y-label"></div>
  <div id="tooltip"></div>
</div>

<div id="sidebar">
  <div class="panel-section">
    <h2>Load Data</h2>
    <div class="file-input-area" id="file-drop">
      Click or drop <code>layout.json</code> here
      <input type="file" id="file-input" accept=".json" style="display:none">
    </div>
  </div>

  <div class="panel-section" id="legend-section" style="display:none">
    <h2>Contributors</h2>
    <div id="legend"></div>
  </div>

  <div class="panel-section" id="clusters-section" style="display:none">
    <h2>Clusters</h2>
    <div id="clusters"></div>
  </div>

  <div class="panel-section" id="docs-section" style="display:none">
    <h2>Documents</h2>
    <div id="doc-list"></div>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────────

let layoutData = null;
let xAxisIdx = 0;
let yAxisIdx = 1;
let hoveredDoc = null;
let highlightedCluster = null;

const COLORS = [
  '#60a5fa', '#a78bfa', '#34d399', '#fbbf24', '#f87171',
  '#fb923c', '#e879f9', '#22d3ee', '#a3e635', '#f472b6'
];
const BLOB_COLORS = [
  '#6b8cae', '#8b7a6b', '#7b9e6b', '#9b7b8e', '#6b9b9b',
  '#ae8b6b', '#7b8bae', '#9b8b6b', '#6bae8b', '#8b6b9b'
];
let contributorColors = {};
let aggregationThreshold = 0;
let currentClusters = [];
let clusterColorMap = {};
let hoveredCluster = null;
let docToClusterMap = new Map();
let maxDendrogramDist = 0;
let minDendrogramDist = 0;

// ── File loading ────────────────────────────────────────────

const fileDrop = document.getElementById('file-drop');
const fileInput = document.getElementById('file-input');

fileDrop.addEventListener('click', () => fileInput.click());
fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.style.borderColor = 'var(--accent)'; });
fileDrop.addEventListener('dragleave', () => { fileDrop.style.borderColor = 'var(--border)'; });
fileDrop.addEventListener('drop', e => {
  e.preventDefault();
  fileDrop.style.borderColor = 'var(--border)';
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) loadFile(e.target.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      layoutData = JSON.parse(e.target.result);
      initVisualization();
    } catch (err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ── Initialization ──────────────────────────────────────────

function initVisualization() {
  if (!layoutData) return;

  const contributors = [...new Set(layoutData.documents.map(d => d.tags?.contributor || 'unknown'))];
  contributors.forEach((c, i) => { contributorColors[c] = COLORS[i % COLORS.length]; });

  const xSel = document.getElementById('x-axis');
  const ySel = document.getElementById('y-axis');
  xSel.innerHTML = '';
  ySel.innerHTML = '';

  layoutData.axes.forEach((ax, i) => {
    const label = `PC${ax.index}: ${ax.label} (${(ax.variance_explained * 100).toFixed(1)}%)`;
    xSel.add(new Option(label, i));
    ySel.add(new Option(label, i));
  });

  xSel.value = 0;
  ySel.value = Math.min(1, layoutData.axes.length - 1);
  xAxisIdx = 0;
  yAxisIdx = parseInt(ySel.value);

  xSel.addEventListener('change', () => { xAxisIdx = parseInt(xSel.value); render(); });
  ySel.addEventListener('change', () => { yAxisIdx = parseInt(ySel.value); render(); });

  // Aggregation slider
  const slider = document.getElementById('agg-slider');
  const aggLabel = document.getElementById('agg-label');
  document.getElementById('agg-slider-container').style.display = '';
  if (layoutData.dendrogram) {
    const dists = collectDistances(layoutData.dendrogram);
    maxDendrogramDist = Math.max(...dists);
    minDendrogramDist = Math.min(...dists);
  } else {
    maxDendrogramDist = 0;
    minDendrogramDist = 0;
  }

  slider.addEventListener('input', () => {
    const pct = parseFloat(slider.value) / 1000;
    // pct=0 → full resolution; pct>0 maps across [minDist-ε, maxDist+ε] where merges happen
    const eps = (maxDendrogramDist - minDendrogramDist) * 0.02;
    aggregationThreshold = pct === 0 ? 0 : (minDendrogramDist - eps) + pct * (maxDendrogramDist - minDendrogramDist + 2 * eps);
    currentClusters = cutDendrogram(aggregationThreshold);
    assignClusterColors(currentClusters);
    rebuildDocToClusterMap();
    const count = currentClusters.length;
    aggLabel.textContent = count === 1 ? '1 cluster' : `${count} clusters`;
    buildClusterList();
    render();
  });

  aggregationThreshold = 0;
  currentClusters = cutDendrogram(0);
  assignClusterColors(currentClusters);
  rebuildDocToClusterMap();
  aggLabel.textContent = `${layoutData.documents.length} clusters`;
  slider.value = 0;

  document.getElementById('stats').textContent =
    `${layoutData.n_documents} docs · ${layoutData.n_concepts} concepts`;

  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  contributors.forEach(c => {
    const count = layoutData.documents.filter(d => (d.tags?.contributor || 'unknown') === c).length;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${contributorColors[c]}"></div>${c}<span class="legend-count">${count}</span>`;
    legend.appendChild(item);
  });
  document.getElementById('legend-section').style.display = '';

  buildClusterList();
  buildDocList();
  render();
}

// ── Cluster list from dendrogram ────────────────────────────

function buildClusterList() {
  const container = document.getElementById('clusters');
  container.innerHTML = '';

  if (!layoutData.dendrogram) return;

  if (aggregationThreshold === 0) {
    container.innerHTML = '<div style="font-size:12px;color:var(--fg2);padding:8px;">Adjust aggregation slider to group documents into clusters.</div>';
    document.getElementById('clusters-section').style.display = '';
    return;
  }

  currentClusters.forEach(cluster => {
    const item = document.createElement('div');
    item.className = 'cluster-item';
    const color = clusterColorMap[cluster.nodeId] || '#888';
    item.style.borderLeftColor = color;
    item.innerHTML = `
      <div class="cluster-label" style="color:${color}">${cluster.label || 'cluster'}</div>
      <div class="cluster-docs">${cluster.size} document${cluster.size !== 1 ? 's' : ''}</div>
    `;
    item.addEventListener('mouseenter', () => {
      highlightedCluster = new Set(cluster.docIds);
      hoveredCluster = cluster.nodeId;
      render();
    });
    item.addEventListener('mouseleave', () => {
      highlightedCluster = null;
      hoveredCluster = null;
      render();
    });
    container.appendChild(item);
  });

  document.getElementById('clusters-section').style.display = '';
}

function buildDocList() {
  const container = document.getElementById('doc-list');
  container.innerHTML = '';

  layoutData.documents.forEach(doc => {
    const item = document.createElement('div');
    item.className = 'doc-list-item';
    const contributor = doc.tags?.contributor || 'unknown';
    const color = contributorColors[contributor] || '#888';
    item.innerHTML = `
      <div class="doc-title" style="color:${color}">${doc.title}</div>
      <div class="doc-meta">${contributor} · ${doc.n_concepts} concepts</div>
    `;
    item.addEventListener('mouseenter', () => {
      hoveredDoc = doc.doc_id;
      if (aggregationThreshold > 0) {
        const cId = docToClusterMap.get(doc.doc_id);
        if (cId !== undefined) {
          hoveredCluster = cId;
          const cluster = currentClusters.find(c => c.nodeId === cId);
          if (cluster) highlightedCluster = new Set(cluster.docIds);
        }
      }
      render();
    });
    item.addEventListener('mouseleave', () => {
      hoveredDoc = null;
      hoveredCluster = null;
      highlightedCluster = null;
      render();
    });
    container.appendChild(item);
  });

  document.getElementById('docs-section').style.display = '';
}

// ── Dendrogram cut & cluster helpers ────────────────────────

function collectDistances(node) {
  const dists = [];
  if (node.distance > 0) dists.push(node.distance);
  if (node.left) dists.push(...collectDistances(node.left));
  if (node.right) dists.push(...collectDistances(node.right));
  return dists;
}

function cutDendrogram(threshold) {
  if (!layoutData || !layoutData.dendrogram) return [];
  const clusters = [];
  function walk(node) {
    if (!node.left && !node.right) {
      clusters.push({ nodeId: node.node_id, label: node.label, docIds: node.doc_ids, size: node.size });
      return;
    }
    if (node.distance <= threshold) {
      clusters.push({ nodeId: node.node_id, label: node.label, docIds: node.doc_ids, size: node.size });
    } else {
      if (node.left) walk(node.left);
      if (node.right) walk(node.right);
    }
  }
  walk(layoutData.dendrogram);
  return clusters;
}

function assignClusterColors(clusters) {
  clusterColorMap = {};
  clusters.forEach((c, i) => { clusterColorMap[c.nodeId] = BLOB_COLORS[i % BLOB_COLORS.length]; });
}

function rebuildDocToClusterMap() {
  docToClusterMap = new Map();
  currentClusters.forEach(c => {
    c.docIds.forEach(id => docToClusterMap.set(id, c.nodeId));
  });
}

// ── Rendering ───────────────────────────────────────────────

function render() {
  if (!layoutData) return;

  const container = document.getElementById('plot-container');
  const canvas = document.getElementById('canvas');
  const dpr = window.devicePixelRatio || 1;
  const w = container.clientWidth;
  const h = container.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg').trim();
  ctx.fillRect(0, 0, w, h);

  const xKey = `pc${layoutData.axes[xAxisIdx].index}`;
  const yKey = `pc${layoutData.axes[yAxisIdx].index}`;

  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  layoutData.documents.forEach(d => {
    const x = d.coordinates[xKey] || 0;
    const y = d.coordinates[yKey] || 0;
    if (x < xMin) xMin = x; if (x > xMax) xMax = x;
    if (y < yMin) yMin = y; if (y > yMax) yMax = y;
  });

  const pad = 60;
  const xRange = (xMax - xMin) || 1;
  const yRange = (yMax - yMin) || 1;
  const xScale = (w - pad * 2) / xRange;
  const yScale = (h - pad * 2) / yRange;

  // Draw grid at origin
  ctx.strokeStyle = '#1a2235';
  ctx.lineWidth = 1;
  const midX = pad + (0 - xMin) * xScale;
  const midY = h - pad - (0 - yMin) * yScale;
  if (midX > pad && midX < w - pad) {
    ctx.beginPath(); ctx.moveTo(midX, pad); ctx.lineTo(midX, h - pad); ctx.stroke();
  }
  if (midY > pad && midY < h - pad) {
    ctx.beginPath(); ctx.moveTo(pad, midY); ctx.lineTo(w - pad, midY); ctx.stroke();
  }

  // Compute screen positions
  const docScreenPositions = layoutData.documents.map(doc => {
    const x = doc.coordinates[xKey] || 0;
    const y = doc.coordinates[yKey] || 0;
    return {
      doc,
      sx: pad + (x - xMin) * xScale,
      sy: h - pad - (y - yMin) * yScale,
    };
  });

  // Build position lookup for blob rendering
  const docPosMap = new Map();
  docScreenPositions.forEach(d => docPosMap.set(d.doc.doc_id, d));

  // Draw cluster blobs (only when aggregation > 0)
  if (aggregationThreshold > 0 && currentClusters.length > 0) {
    const baseRadius = 45;
    currentClusters.forEach(cluster => {
      const color = clusterColorMap[cluster.nodeId];
      const members = cluster.docIds.map(id => docPosMap.get(id)).filter(Boolean);
      if (members.length === 0) return;

      const blobInHighlight = !highlightedCluster || cluster.docIds.some(id => highlightedCluster.has(id));
      const blobDimmed = highlightedCluster && !blobInHighlight;
      const radius = Math.sqrt(cluster.size) * baseRadius;

      members.forEach(({ sx, sy }) => {
        ctx.beginPath();
        ctx.arc(sx, sy, radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = blobDimmed ? 0.05 : 0.18;
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.globalAlpha = blobDimmed ? 0.1 : 0.4;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.globalAlpha = 1;
      });
    });
  }

  // Draw cluster connections
  if (highlightedCluster) {
    ctx.strokeStyle = 'rgba(96, 165, 250, 0.15)';
    ctx.lineWidth = 1;
    const clusterDocs = docScreenPositions.filter(d => highlightedCluster.has(d.doc.doc_id));
    for (let i = 0; i < clusterDocs.length; i++) {
      for (let j = i + 1; j < clusterDocs.length; j++) {
        ctx.beginPath();
        ctx.moveTo(clusterDocs[i].sx, clusterDocs[i].sy);
        ctx.lineTo(clusterDocs[j].sx, clusterDocs[j].sy);
        ctx.stroke();
      }
    }
  }

  // Draw dots
  const isAggregated = aggregationThreshold > 0;
  docScreenPositions.forEach(({ doc, sx, sy }) => {
    const contributor = doc.tags?.contributor || 'unknown';
    const color = contributorColors[contributor] || '#888';
    const isHovered = doc.doc_id === hoveredDoc;
    const inCluster = !highlightedCluster || highlightedCluster.has(doc.doc_id);
    const dimmed = highlightedCluster && !inCluster;

    if (isAggregated) {
      // Small member dots inside blobs
      const radius = isHovered ? 6 : 3.5;
      const alpha = dimmed ? 0.1 : 1;

      if (isHovered) {
        ctx.beginPath();
        ctx.arc(sx, sy, 14, 0, Math.PI * 2);
        ctx.fillStyle = color + '22';
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(sx, sy, radius, 0, Math.PI * 2);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Full-resolution dots
      const radius = isHovered ? 10 : 7;
      const alpha = dimmed ? 0.15 : 1;

      if (isHovered) {
        ctx.beginPath();
        ctx.arc(sx, sy, 20, 0, Math.PI * 2);
        ctx.fillStyle = color + '22';
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(sx, sy, radius, 0, Math.PI * 2);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = dimmed ? 'transparent' : 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Labels at full resolution
      if (isHovered || layoutData.documents.length <= 20) {
        ctx.font = `${dimmed ? '10' : '11'}px 'DM Sans', sans-serif`;
        ctx.fillStyle = dimmed ? 'rgba(148,163,184,0.3)' : '#e2e8f0';
        ctx.textAlign = 'center';
        const label = doc.title.length > 35 ? doc.title.substring(0, 35) + '…' : doc.title;
        ctx.fillText(label, sx, sy - radius - 6);
      }
    }
  });

  // Draw blob hover/highlight labels
  if (isAggregated) {
    currentClusters.forEach(cluster => {
      const isHoveredBlob = hoveredCluster === cluster.nodeId;
      const isHighlighted = highlightedCluster && cluster.docIds.some(id => highlightedCluster.has(id));

      if (isHoveredBlob || isHighlighted) {
        const members = cluster.docIds.map(id => docPosMap.get(id)).filter(Boolean);
        if (members.length === 0) return;

        const cx = members.reduce((s, m) => s + m.sx, 0) / members.length;
        const cy = members.reduce((s, m) => s + m.sy, 0) / members.length;

        ctx.font = "bold 12px 'DM Sans', sans-serif";
        ctx.fillStyle = '#e2e8f0';
        ctx.textAlign = 'center';
        ctx.fillText(cluster.label, cx, cy - 8);
        ctx.font = "11px 'JetBrains Mono', monospace";
        ctx.fillStyle = '#94a3b8';
        ctx.fillText(`${cluster.size} document${cluster.size !== 1 ? 's' : ''}`, cx, cy + 8);
      }
    });
  }

  // Axis labels
  document.getElementById('x-label').textContent = layoutData.axes[xAxisIdx].label;
  document.getElementById('y-label').textContent = layoutData.axes[yAxisIdx].label;
}

// ── Mouse interaction ───────────────────────────────────────

const canvasEl = document.getElementById('canvas');
const tooltip = document.getElementById('tooltip');

canvasEl.addEventListener('mousemove', e => {
  if (!layoutData) return;

  const container = document.getElementById('plot-container');
  const rect = canvasEl.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const w = container.clientWidth;
  const h = container.clientHeight;
  const pad = 60;

  const xKey = `pc${layoutData.axes[xAxisIdx].index}`;
  const yKey = `pc${layoutData.axes[yAxisIdx].index}`;

  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  layoutData.documents.forEach(d => {
    const x = d.coordinates[xKey] || 0;
    const y = d.coordinates[yKey] || 0;
    if (x < xMin) xMin = x; if (x > xMax) xMax = x;
    if (y < yMin) yMin = y; if (y > yMax) yMax = y;
  });
  const xRange = (xMax - xMin) || 1;
  const yRange = (yMax - yMin) || 1;
  const xScale = (w - pad * 2) / xRange;
  const yScale = (h - pad * 2) / yRange;

  // Find closest doc
  const docThreshold = aggregationThreshold > 0 ? 10 : 20;
  let closest = null;
  let closestDist = docThreshold;

  layoutData.documents.forEach(doc => {
    const x = doc.coordinates[xKey] || 0;
    const y = doc.coordinates[yKey] || 0;
    const sx = pad + (x - xMin) * xScale;
    const sy = h - pad - (y - yMin) * yScale;
    const dist = Math.sqrt((mx - sx) ** 2 + (my - sy) ** 2);
    if (dist < closestDist) {
      closestDist = dist;
      closest = doc;
    }
  });

  // Find hovered blob (when aggregated)
  let newHoveredCluster = null;
  if (aggregationThreshold > 0 && currentClusters.length > 0) {
    const baseRadius = 45;
    for (const cluster of currentClusters) {
      const blobRadius = Math.sqrt(cluster.size) * baseRadius;
      for (const docId of cluster.docIds) {
        const doc = layoutData.documents.find(d => d.doc_id === docId);
        if (!doc) continue;
        const x = doc.coordinates[xKey] || 0;
        const y = doc.coordinates[yKey] || 0;
        const sx = pad + (x - xMin) * xScale;
        const sy = h - pad - (y - yMin) * yScale;
        const dist = Math.sqrt((mx - sx) ** 2 + (my - sy) ** 2);
        if (dist < blobRadius) {
          newHoveredCluster = cluster.nodeId;
          break;
        }
      }
      if (newHoveredCluster !== null) break;
    }
  }
  hoveredCluster = newHoveredCluster;

  if (closest) {
    hoveredDoc = closest.doc_id;
    const contributor = closest.tags?.contributor || 'unknown';
    tooltip.innerHTML = `
      <div class="title">${closest.title}</div>
      <div class="meta">${contributor} · ${closest.n_concepts} concepts · ${closest.source}</div>
    `;
    tooltip.style.display = 'block';

    let tx = e.clientX - rect.left + 16;
    let ty = e.clientY - rect.top - 10;
    if (tx + 320 > w) tx = e.clientX - rect.left - 336;
    if (ty + 100 > h) ty = h - 110;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else {
    hoveredDoc = null;
    tooltip.style.display = 'none';
  }

  render();
});

canvasEl.addEventListener('mouseleave', () => {
  hoveredDoc = null;
  hoveredCluster = null;
  tooltip.style.display = 'none';
  render();
});

window.addEventListener('resize', () => { if (layoutData) render(); });
</script>
</body>
